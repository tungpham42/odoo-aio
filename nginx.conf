worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Odoo upstream (matching the docker-compose service name 'odoo' and port '8069')
    upstream odoo {
        server odoo:8069;
    }

    # Odoo chat/websocket upstream (typically 8072 if workers are configured)
    upstream odoochat {
        server odoo:8072;
    }

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name localhost; # Replace with your domain if you have one, e.g., odoo.yourdomain.com
        return 301 https://$host$request_uri;
    }

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name localhost; # Replace with your domain

        # SSL Certificate locations (maps to the mounted volume in docker-compose)
        ssl_certificate /etc/ssl/certs/nginx.crt;
        ssl_certificate_key /etc/ssl/certs/nginx.key;

        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Increase proxy read timeout for long-running Odoo queries
        proxy_read_timeout 720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout 720s;

        # Allow large file uploads (e.g., for database restores)
        client_max_body_size 100M;

        # Add headers for Odoo proxy mode
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # Standard Odoo web traffic
        location / {
            proxy_redirect off;
            proxy_pass http://odoo;
        }

        # WebSocket traffic (Odoo 16+ heavily relies on this)
        location /websocket {
            proxy_pass http://odoochat;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Cache static files
        location ~* /web/static/ {
            proxy_cache_valid 200 90m;
            proxy_buffering on;
            expires 864000;
            proxy_pass http://odoo;
        }
    }
}